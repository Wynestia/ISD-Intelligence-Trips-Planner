version: "3.9"

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: isd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: isd
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d isd" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── LLM Service (FastAPI / Groq) ────────────────────────────────────────
  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: isd-llm
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      # Persist ChromaDB vector store between restarts
      - chroma_data:/app/chroma_db
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Backend API (ElysiaJS / Node.js) ────────────────────────────────────
  isd-backend:
    build:
      context: ./isd-backend
      dockerfile: Dockerfile
    container_name: isd-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/isd?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_here}
      LLM_SERVICE_URL: http://llm:8000
    ports:
      - "3123:3123"
    depends_on:
      postgres:
        condition: service_healthy
      llm:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3123/" ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Frontend (Vite / React) ──────────────────────────────────────────────
  isd-frontend:
    build:
      context: ./isd-frontend
      dockerfile: Dockerfile
    container_name: isd-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      isd-backend:
        condition: service_healthy

volumes:
  postgres_data:
  chroma_data:
